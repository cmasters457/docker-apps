services:
  postgres:
    container_name: postgres
    image: postgres:17.4
    restart: always
    env_file:
      - .env 
    #ports:
    #  - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./backup:/backup
    networks:
      - sql-isolate
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
networks:
  sql-isolate:
    external: true